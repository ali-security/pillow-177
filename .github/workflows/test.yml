name: Test

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [
          "ubuntu-latest",
          # "macOS-latest",
        ]
        python-version: [
          # "pypy3", # TODO: undo
          "3.8",
          # "3.7", # TODO: undo
          # "3.6", # TODO: undo
          # "3.5",  # TODO: undo
        ]
        # TODO: undo
        # include:
        # - python-version: "3.5"
        #   env: PYTHONOPTIMIZE=2
        # - python-version: "3.6"
        #   env: PYTHONOPTIMIZE=1
        # # Include new variables for Codecov
        # - os: ubuntu-latest
        #   codecov-flag: GHA_Ubuntu
        # - os: macOS-latest
        #   codecov-flag: GHA_macOS

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} Python ${{ matrix.python-version }}

    steps:
    - uses: actions/checkout@v2

    - name: Ubuntu cache
      uses: actions/cache@v1
      if: startsWith(matrix.os, 'ubuntu')
      with:
        path: ~/.cache/pip
        key:
          ${{ matrix.os }}-${{ matrix.python-version }}-${{ hashFiles('**/.ci/*.sh') }}
        restore-keys: |
          ${{ matrix.os }}-${{ matrix.python-version }}-

    - name: playground
      run: |
        echo "aaa"

        sudo add-apt-repository ppa:linuxuprising/libpng12
        sudo apt update
        sudo apt install libpng12-0


        sudo apt-get purge imagemagick
        sudo apt-get purge imagemagick-6-common
        wget http://archive.ubuntu.com/ubuntu/pool/main/i/imagemagick/imagemagick-common_6.8.9.9-7ubuntu5.16_all.deb
        wget http://archive.ubuntu.com/ubuntu/pool/main/i/imagemagick/imagemagick_6.8.9.9-7ubuntu5_amd64.deb
        wget http://archive.ubuntu.com/ubuntu/pool/main/i/imagemagick/imagemagick-6.q16_6.8.9.9-7ubuntu5_amd64.deb
        wget http://archive.ubuntu.com/ubuntu/pool/main/i/imagemagick/libmagickwand-6.q16-2_6.8.9.9-7ubuntu5.16_amd64.deb
        wget http://archive.ubuntu.com/ubuntu/pool/main/i/imagemagick/libmagickcore-6.q16-2_6.8.9.9-7ubuntu5.16_amd64.deb
        sudo dpkg -i ./imagemagick-common_6.8.9.9-7ubuntu5.16_all.deb
        sudo dpkg -i ./libmagickcore-6.q16-2_6.8.9.9-7ubuntu5.16_amd64.deb
        sudo dpkg -i ./libmagickwand-6.q16-2_6.8.9.9-7ubuntu5.16_amd64.deb
        sudo dpkg -i ./imagemagick-6.q16_6.8.9.9-7ubuntu5_amd64.deb
        which display


    - name: macOS cache
      uses: actions/cache@v1
      if: startsWith(matrix.os, 'macOS')
      with:
        path: ~/Library/Caches/pip
        key:
          ${{ matrix.os }}-${{ matrix.python-version }}-${{ hashFiles('**/.ci/*.sh') }}
        restore-keys: |
          ${{ matrix.os }}-${{ matrix.python-version }}-

    - name: Set up Python ${{ matrix.python-version }}
      uses: MatteoH2O1999/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
      env:
        PIP_TRUSTED_HOST: pypi.python.org 

    - name: Build system information
      run: python .github/workflows/system-info.py

    - name: Install Linux dependencies
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        .ci/install.sh

    - name: Install macOS dependencies
      if: startsWith(matrix.os, 'macOS')
      run: |
        .github/workflows/macos-install.sh

    - name: Build
      run: |
        .ci/build.sh

    - name: Test
      run: |
        .ci/test.sh

    - name: Prepare to upload errors
      if: failure()
      run: |
        mkdir -p Tests/errors
      shell: pwsh

    - name: Upload errors
      uses: actions/upload-artifact@v1
      if: failure()
      with:
        name: errors
        path: Tests/errors

    - name: Docs
      if: startsWith(matrix.os, 'ubuntu') && matrix.python-version == 3.8
      run: |
        pip install --index-url 'https://:2020-06-30T10:43:17.228801Z@time-machines-pypi.sealsecurity.io/' sphinx-rtd-theme
        make doccheck

    - name: After success
      run: |
        .ci/after_success.sh

    - name: Upload coverage
      run: bash <(curl -s https://codecov.io/bash) -F ${{ matrix.codecov-flag }}
      env:
        CODECOV_NAME: ${{ matrix.os }} Python ${{ matrix.python-version }}